apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skillexchange-route
spec:
  parentRefs:
    - name: kgatewayd
  rules: #path based routing
    - matches:
      - path:
          type: PathPrefix
          value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: skillexchange-active-service
          port: 3000