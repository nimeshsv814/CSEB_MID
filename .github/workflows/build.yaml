name: CICD Pipeline

on:
  # push:
  #   branch: main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Enter the version (eg: v1.0.0)"
        required: true

env:
  IMAGE_NAME: skillexchange

jobs:
  continous-integration:
    name: Build Image and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Build Image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:${{inputs.release_tag}} .
      
      - name: Dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}} 
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Push to Hub
        run: docker push ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:${{inputs.release_tag}}