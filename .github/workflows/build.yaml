# DockerHUB push
name: CICD Pipeline

on:
  # push:
  #   branch: main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Enter the version (eg: v1.0.0)"
        required: true

env:
  IMAGE_NAME: skillexchange

jobs:
  continous-integration:
    name: Build Image and Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login GHCR
        run: echo ${{secrets.TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin

      - name: Convert repo to lowercase
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      
      - name: Build Image
        run: docker build -t ghcr.io/${{ env.REPO_LC }}/${{env.IMAGE_NAME}}:${{inputs.release_tag}} .

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ env.REPO_LC }}/${{env.IMAGE_NAME}}:${{inputs.release_tag}}

      
